{% extends "base.html" %} {% block title %}Добавление товара{% endblock %} {%
block content %}
<main>
  <div class="admin-container">
    <div class="admin-header">
      <h1>➕ Добавление нового товара</h1>
      <a href="{{ url_for('admin.products.products') }}" class="btn btn-outline"
        >← Назад к списку</a
      >
    </div>

    <form method="POST" class="admin-form">
      <div class="form-grid">
        <!-- Левая колонка -->
        <div class="form-section">
          <h3>Основная информация</h3>

          <div class="form-group">
            <label>Название товара *</label>
            <input
              type="text"
              name="name"
              required
              class="form-control"
              placeholder="Введите название"
            />
          </div>

          <div class="form-group">
            <label>Описание</label>
            <textarea
              name="description"
              rows="5"
              class="form-control"
              placeholder="Подробное описание товара..."
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Цена *</label>
              <input
                type="number"
                name="price"
                step="0.01"
                required
                class="form-control"
                placeholder="0.00"
              />
            </div>
            <div class="form-group">
              <label>Старая цена (скидка)</label>
              <input
                type="number"
                name="old_price"
                step="0.01"
                class="form-control"
                placeholder="0.00"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Категория *</label>
              <select name="category_id" required class="form-control">
                <option value="">— Выберите категорию —</option>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="form-group">
              <label>Единица измерения</label>
              <select name="unit" class="form-control">
                <option value="шт">штука (шт)</option>
                <option value="кг">килограмм (кг)</option>
                <option value="г">грамм (г)</option>
                <option value="л">литр (л)</option>
                <option value="мл">миллилитр (мл)</option>
                <option value="уп">упаковка (уп)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Количество на складе</label>
            <input type="number" name="stock" value="0" class="form-control" />
          </div>
        </div>

        <!-- Правая колонка -->
        <div class="form-section">
          <h3>Изображение</h3>

          <div class="form-group">
            <label>URL изображения</label>
            <input
              type="text"
              name="image_url"
              id="image_url"
              value="/static/images/products/default-product.jpg"
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label>Alt текст</label>
            <input
              type="text"
              name="image_alt"
              class="form-control"
              placeholder="Описание изображения"
            />
          </div>

          <div class="image-preview">
            <img
              id="preview"
              src="/static/images/products/default-product.jpg"
              alt="Preview"
            />
            <p class="hint">Предпросмотр изображения</p>
          </div>
        </div>

        <!-- Третья колонка -->
        <div class="form-section">
          <h3>Статусы и метки</h3>

          <label class="checkbox-label">
            <input type="checkbox" name="is_new" /> 🆕 Новинка
            <span class="checkbox-desc">Отметить как новый товар</span>
          </label>

          <label class="checkbox-label">
            <input type="checkbox" name="is_hit" /> 🔥 Хит продаж
            <span class="checkbox-desc">Популярный товар</span>
          </label>
        </div>
      </div>

      <div class="form-buttons">
        <button type="submit" class="btn btn-primary btn-large">
          💾 Сохранить товар
        </button>
        <a
          href="{{ url_for('admin.products.products') }}"
          class="btn btn-outline btn-large"
        >
          ❌ Отмена
        </a>
      </div>
    </form>
  </div>
</main>

<script>
  // Предпросмотр изображения
  const urlInput = document.getElementById("image_url");
  const preview = document.getElementById("preview");

  urlInput.addEventListener("input", function () {
    preview.src = this.value || "/static/images/products/default-product.jpg";
  });
</script>
{% endblock %}
