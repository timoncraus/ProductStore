{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="form-container">
    <h2>📝 Регистрация</h2>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Имя пользователя *</label>
            <input type="text" id="username" name="username" minlength="3" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Телефон *</label>
            <input type="tel" id="phone" name="phone" required placeholder="+79123456789">
        </div>
        
        <div class="form-group">
            <label for="first_name">Имя</label>
            <input type="text" id="first_name" name="first_name">
        </div>
        
        <div class="form-group">
            <label for="last_name">Фамилия</label>
            <input type="text" id="last_name" name="last_name">
        </div>
        
        <div class="form-group">
            <label for="password">Пароль *</label>
            <input type="password" id="password" name="password" required>
            <small class="form-hint">Минимум 9 символов, буквы, цифры и спецсимволы</small>
        </div>
        
        <div class="form-group">
            <label for="password2">Подтверждение пароля *</label>
            <input type="password" id="password2" name="password2" required>
        </div>
        
        <div class="form-group">
            <label for="captcha">Капча: {{ captcha_question }} = ?</label>
            <input type="text" id="captcha" name="captcha" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
    </form>
    
    <p class="form-footer">
        Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a>
    </p>
</div>
{% endblock %}
